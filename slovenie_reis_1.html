const phases = [
  {label:"🎢 Heen"},
  {label:"🏔 Bled"},
  {label:"🌊 Kust"},
  {label:"🏛 Dolenjska"},
  {label:"🌿 Heuvels"},
  {label:"🏡 Taunus"}
];

let currentPhase = 0;

function renderPhaseTabs() {
  document.getElementById('phaseTabs').innerHTML = phases.map((p,i) =>
    `<button class="phase-tab ${i===currentPhase?'active':''}" onclick="setPhase(${i})">${p.label}</button>`
  ).join('');
}

function setPhase(i) {
  currentPhase = i;
  renderPhaseTabs();
  const pd = days.filter(d => d.phase === i);
  renderDayNav(pd);
  showDay(days.indexOf(pd[0]));
}

function renderDayNav(pd) {
  document.getElementById('dayNav').innerHTML = pd.map(d => {
    const idx = days.indexOf(d);
    return `<button class="day-pill" data-idx="${idx}" onclick="showDay(${idx})">${d.label}</button>`;
  }).join('');
}

function linksHtml(links) {
  if (!links || !links.length) return '';
  return `<div class="links">${links.map(l =>
    `<a class="link-btn ${l.cls||''}" href="${l.url}" target="_blank">${l.label}</a>`
  ).join('')}</div>`;
}

function showDay(idx) {
  const d = days[idx];
  document.querySelectorAll('.day-pill').forEach(p =>
    p.classList.toggle('active', parseInt(p.dataset.idx) === idx)
  );
  document.querySelector(`.day-pill[data-idx="${idx}"]`)
    ?.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});

  let html = `<div class="day-header">
    <div class="date-label">${d.label}</div>
    <h2>${d.title}</h2>`;
  if (d.verblijf) html += `<span class="night-badge">🏠 ${d.verblijf}</span>`;
  html += `</div>`;

  if (d.checkin) {
    html += `<div class="checkin-card"><h3>Verblijf</h3><p>${d.checkin}</p></div>`;
  }

  const realInfo = d.info.filter(i => i.text);
  if (realInfo.length) {
    html += `<div class="section-label">Vandaag</div>`;
    for (const item of realInfo) {
      html += `<div class="info-card"><h3>${item.title}</h3><p>${item.text}</p>${linksHtml(item.links)}</div>`;
    }
  }

  if (d.tips.length) {
    html += `<div class="section-label">Tips & activiteiten</div>`;
    for (const tip of d.tips) {
      html += `<div class="tip-card"><div class="tip-title">${tip.title}</div><p>${tip.text}</p>${linksHtml(tip.links)}</div>`;
    }
  }

  document.getElementById('dayContent').innerHTML = html;
}

function goToday() {
  const today = new Date().toISOString().split('T')[0];
  const idx = days.findIndex(d => d.date === today);
  if (idx >= 0) {
    currentPhase = days[idx].phase;
    renderPhaseTabs();
    renderDayNav(days.filter(d => d.phase === currentPhase));
    showDay(idx);
  }
}

renderPhaseTabs();
setPhase(0);
